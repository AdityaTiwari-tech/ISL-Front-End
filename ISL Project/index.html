<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISL Smart Communicator</title>
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {pageLanguage: 'en', includedLanguages: 'en,hi,mr,ta', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 
        'google_translate_element'
      );
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  
</head>
<body>

  <nav class="navbar">
    <div class="nav-links">
      <a href="#">HOME</a>
      <a href="about.html">ABOUT US</a>
      <a href="learn.html">LEARN</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">CONTACT US</a>

    </div>
    <div class="nav-icons">
      <button class="toggle-btn" id="modeToggle">🌗 DARK</button>
      <div class="profile-icon">👤</div>
    </div>
    <div id="google_translate_element"></div>
    <div id="g_id_onload"
    data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
    data-login_uri=""
    data-auto_prompt="false">
</div>

<div class="g_id_signin"
    data-type="standard"
    data-shape="rectangular"
    data-theme="outline"
    data-text="sign_in_with"
    data-size="large"
    data-logo_alignment="left">
</div>

  </nav>

  <header class="hero-section">
    <h1>ISL SMART COMMUNICATOR</h1>
    <h2>"Bridging Conversations, Empowering Communication"</h2>

    <button class="get-started-btn">GET STARTED</button>
    <div class="hero-image">
      <img src="https://cdn.pixabay.com/photo/2017/03/17/21/14/jesus-2152703_1280.png" alt="Two people communicating">
    </div>
  </header>

  <script src="script.js"></script>
</body>
</html>
